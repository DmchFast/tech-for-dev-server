info:
  name: Логин и сохранение JWT-токена
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/login"
  body:
    type: json
    data: |-
      {
        "username": "DD",
        "password": "123"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:5161

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
